name: Publish Docker image

# Builds the amd64 image on GitHub's native x86-64 runners (no local emulation)
# and pushes it to Docker Hub. See PUBLISH.md for the one-time secret setup.

on:
  push:
    branches: [main]
    tags: ["v*"] # e.g. v1.2.0 -> also tags the image 1.2.0 / 1.2 / 1
  workflow_dispatch: # allow manual runs from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ vars.DOCKERHUB_USERNAME }}/personal-media-host
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # single, simple manifest that Container Manager pulls cleanly
          cache-from: type=gha
          cache-to: type=gha,mode=max
